<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2e6e4e" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1c1a17" media="(prefers-color-scheme: dark)">
  <title>Cuaderno — Registro de café</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png" type="image/png">
<style>
  :root{
    --page:#f6f5f0; --surface:#fdfdfb; --ink:#181510; --ink2:#5b564c; --muted:#8a857a;
    --line:#e4e2d9; --hair:rgba(24,21,16,.12);
    --accent:#2e6e4e; --accent-ink:#ffffff; --accent-soft:rgba(46,110,78,.12);
    --cur:#2a78d6; --prev1:#1baf7a; --prev2:#eda100;
    --good:#006300; --warn:#8a5b00; --crit:#d03b3b;
    --serif:ui-serif,"New York",Georgia,serif;
    --sans:-apple-system,system-ui,"Segoe UI",sans-serif;
    --round:ui-rounded,-apple-system,system-ui,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --page:#121110; --surface:#1c1a17; --ink:#f1ede4; --ink2:#b6afa2; --muted:#8a857a;
      --line:#2d2a25; --hair:rgba(255,255,255,.12);
      --accent:#3a8560; --accent-ink:#ffffff; --accent-soft:rgba(88,164,126,.16);
      --cur:#3987e5; --prev1:#199e70; --prev2:#c98500;
      --good:#0ca30c; --warn:#fab219; --crit:#e66767;
    }
  }
  :root[data-theme="dark"]{
    --page:#121110; --surface:#1c1a17; --ink:#f1ede4; --ink2:#b6afa2; --muted:#8a857a;
    --line:#2d2a25; --hair:rgba(255,255,255,.12);
    --accent:#3a8560; --accent-ink:#ffffff; --accent-soft:rgba(88,164,126,.16);
    --cur:#3987e5; --prev1:#199e70; --prev2:#c98500;
    --good:#0ca30c; --warn:#fab219; --crit:#e66767;
  }
  :root[data-theme="light"]{
    --page:#f6f5f0; --surface:#fdfdfb; --ink:#181510; --ink2:#5b564c; --muted:#8a857a;
    --line:#e4e2d9; --hair:rgba(24,21,16,.12);
    --accent:#2e6e4e; --accent-ink:#ffffff; --accent-soft:rgba(46,110,78,.12);
    --cur:#2a78d6; --prev1:#1baf7a; --prev2:#eda100;
    --good:#006300; --warn:#8a5b00; --crit:#d03b3b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{background:var(--page); color:var(--ink); font-family:var(--sans); font-size:16px; line-height:1.45}
  #app{max-width:520px; margin:0 auto; padding:calc(14px + env(safe-area-inset-top)) 16px 96px}
  header.brand{display:flex; align-items:baseline; justify-content:space-between; padding:6px 2px 14px}
  header.brand .t{font-family:var(--serif); font-size:22px; letter-spacing:.01em}
  header.brand .s{font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted)}
  h2{font-family:var(--serif); font-size:20px; margin:18px 0 10px; text-wrap:balance}
  h3{font-size:13px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink2); margin:20px 0 8px; font-weight:600}
  .card{background:var(--surface); border:1px solid var(--hair); border-radius:14px; padding:14px; margin:10px 0}
  .row{display:flex; gap:10px; align-items:center}
  .row.wrap{flex-wrap:wrap}
  .grow{flex:1}
  .muted{color:var(--muted); font-size:13px}
  .small{font-size:13px; color:var(--ink2)}
  label.f{display:block; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:10px 0 4px}
  input[type=text],input[type=number],input[type=date],input[type=password],textarea,select{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px;
    background:var(--surface); color:var(--ink); font-size:16px; font-family:var(--sans)}
  textarea{min-height:64px; resize:vertical}
  input:focus,textarea:focus,select:focus,button:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
  button{font-family:var(--sans); border:none; cursor:pointer}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:48px;
    padding:12px 18px; border-radius:12px; font-size:16px; font-weight:600;
    background:var(--surface); color:var(--ink); border:1px solid var(--line)}
  .btn.primary{background:var(--accent); color:var(--accent-ink); border-color:transparent}
  .btn.ghost{background:transparent; border-color:transparent; color:var(--accent); min-height:40px}
  .btn.danger{color:var(--crit)}
  .btn.block{display:flex; width:100%}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.5; pointer-events:none}
  .tapbtn{display:flex; width:100%; min-height:96px; border-radius:20px; background:var(--accent);
    color:var(--accent-ink); font-size:20px; font-weight:700; letter-spacing:.02em;
    align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(0,0,0,.12); padding:10px 16px; text-align:center}
  .tapbtn:active{transform:scale(.985)}
  #clock{font-family:var(--round); font-variant-numeric:tabular-nums; font-size:64px; font-weight:700;
    text-align:center; letter-spacing:.01em; margin:6px 0 2px}
  .nextcard{border:1.5px solid var(--line); border-radius:14px; padding:12px 14px; background:var(--surface)}
  .nextcard.cue{border-color:var(--accent); background:var(--accent-soft)}
  .nextcard .lbl{font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted)}
  .nextcard .what{font-size:20px; font-weight:700; margin:2px 0}
  .cd{font-family:var(--round); font-variant-numeric:tabular-nums; font-weight:700; font-size:22px}
  .steps{margin:12px 0 0; padding:0; list-style:none}
  .steps li{display:flex; align-items:center; gap:8px; padding:9px 4px; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; flex-wrap:wrap}
  .steps li:last-child{border-bottom:none}
  .steps .tick{color:var(--accent); font-weight:700}
  .steps .t{color:var(--ink2); min-width:44px}
  .steps .dev{font-size:12px; color:var(--muted)}
  .stepper{display:inline-flex; align-items:center; gap:2px}
  .stepper button{min-width:40px; min-height:40px; border-radius:10px; border:1px solid var(--line);
    background:var(--surface); color:var(--ink); font-size:15px; font-weight:600}
  .stepper .val{min-width:64px; text-align:center; font-weight:700; font-variant-numeric:tabular-nums}
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:8px 0}
  .chip{padding:8px 12px; border-radius:999px; border:1px solid var(--line); background:var(--surface);
    font-size:14px; color:var(--ink2)}
  .chip.on{background:var(--accent); color:var(--accent-ink); border-color:transparent}
  .vals{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:8px}
  .vals .v{border:1px solid var(--line); border-radius:10px; padding:6px 4px; text-align:center; font-size:12px; color:var(--ink2)}
  .vals .v b{display:block; font-size:15px; color:var(--ink); font-variant-numeric:tabular-nums}
  .vals .v.unset b{color:var(--muted)}
  .legend{display:flex; gap:14px; flex-wrap:wrap; font-size:13px; color:var(--ink2); margin:6px 0}
  .legend .sw{display:inline-block; width:12px; height:12px; border-radius:3px; margin-right:5px; vertical-align:-1px}
  .blind{border:1px dashed var(--line); border-radius:12px; padding:10px 12px; font-size:13px; color:var(--ink2); background:var(--accent-soft)}
  .deltas{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:8px}
  .deltas .d{border:1px solid var(--line); border-radius:10px; padding:6px 4px; text-align:center; font-size:12px; color:var(--muted)}
  .deltas .d b{display:block; font-size:14px; color:var(--ink); font-variant-numeric:tabular-nums}
  nav#tabs{position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--hair);
    display:flex; justify-content:space-around; padding:8px 6px calc(10px + env(safe-area-inset-bottom))}
  nav#tabs button{background:none; min-width:70px; min-height:48px; border-radius:12px; font-size:12px;
    font-weight:600; color:var(--muted); display:flex; flex-direction:column; gap:2px; align-items:center; justify-content:center}
  nav#tabs button.on{color:var(--accent); background:var(--accent-soft)}
  nav#tabs .ic{font-size:20px; line-height:1}
  #flash{position:fixed; inset:0; background:var(--accent); opacity:0; pointer-events:none; z-index:99}
  #flash.go{animation:fl .45s ease-out}
  @keyframes fl{0%{opacity:.75} 100%{opacity:0}}
  @media (prefers-reduced-motion: reduce){ #flash.go{animation:none} .btn:active,.tapbtn:active{transform:none} }
  table.pt{width:100%; border-collapse:collapse; font-size:14px; font-variant-numeric:tabular-nums}
  table.pt th{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); text-align:left; padding:4px 6px; border-bottom:1px solid var(--line); font-weight:600}
  table.pt td{padding:7px 6px; border-bottom:1px solid var(--line)}
  .planrow{display:grid; grid-template-columns:1fr 64px 62px 62px 34px; gap:5px; margin-bottom:6px; align-items:center}
  .planrow input{padding:9px 6px; font-size:14px}
  .xbtn{min-height:40px; border-radius:10px; background:transparent; color:var(--crit); font-size:18px; border:1px solid transparent}
  .beanline{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 2px; border-bottom:1px solid var(--line)}
  .beanline:last-child{border-bottom:none}
  .num{font-family:var(--serif); font-size:17px}
  .pill{font-size:11px; padding:3px 9px; border-radius:999px; border:1px solid var(--line); color:var(--muted); text-transform:uppercase; letter-spacing:.06em}
  .pill.scored{color:var(--accent); border-color:var(--accent)}
  details.guia{margin-top:8px}
  details.guia summary{color:var(--accent); font-weight:600; font-size:14px; cursor:pointer}
  details.guia ul{padding-left:18px; font-size:13px; color:var(--ink2); margin:8px 0}
  details.guia li{margin-bottom:5px}
  svg text{font-family:var(--sans)}
  .footer-note{text-align:center; font-size:12px; color:var(--muted); margin-top:22px}
  #toast{position:fixed; left:50%; bottom:calc(84px + env(safe-area-inset-bottom)); transform:translateX(-50%);
    background:var(--ink); color:var(--page); padding:10px 18px; border-radius:999px; font-size:14px;
    font-weight:600; opacity:0; pointer-events:none; transition:opacity .25s; z-index:100; max-width:88%; text-align:center}
  #toast.show{opacity:1}
  .btn[data-armed="1"]{background:var(--crit); color:#fff; border-color:transparent}
  .sync-dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-left:6px; vertical-align:1px}
  .sync-dot.ok{background:var(--good)}
  .sync-dot.stale{background:var(--warn)}
  .sync-dot.off{background:var(--muted)}
  .sync-status{font-size:12px; color:var(--muted); margin-top:6px}
  .token-field{font-family:monospace; font-size:14px; letter-spacing:.05em}
  #updateBar{position:fixed; top:0; left:0; right:0; z-index:200; background:var(--accent); color:var(--accent-ink);
    display:flex; align-items:center; justify-content:center; gap:12px; padding:12px 16px; font-size:14px; font-weight:600;
    transform:translateY(-100%); transition:transform .3s}
  #updateBar.show{transform:translateY(0)}
</style>
</head>
<body>
<div id="app">
  <header class="brand">
    <span class="t">Cuaderno</span>
    <span class="s">registro de café</span>
  </header>
  <main id="main"></main>
</div>
<nav id="tabs"></nav>
<div id="flash" aria-hidden="true"></div>
<div id="toast" role="status"></div>
<div id="updateBar">Nueva versión disponible <button class="btn" style="min-height:36px;padding:6px 14px;font-size:13px" onclick="updateApp()">Actualizar</button></div>

<script>
'use strict';
/* ---------- constantes ---------- */
const KEY='cuaderno-v1';
const SYNC_KEY='cuaderno-sync';
const GIST_FILE='cuaderno-backup.json';
const AXES=[['sweet','Dulzor'],['body','Cuerpo'],['salt','Sal'],['flavour','Sabor'],
            ['acidity','Acidez'],['aftertaste','Retrogusto'],['bitter','Amargor'],['aroma','Aroma']];
const WHEEL={
  'Frutal':['mora','arándano','fresa','cítrico','naranja','limón','fruta de hueso','ciruela','tropical','fruta pasa','manzana','uva'],
  'Floral':['floral','jazmín','rosa','manzanilla','té negro'],
  'Dulce':['caramelo','miel','azúcar moreno','vainilla','melaza'],
  'Cacao / frutos secos':['chocolate','chocolate oscuro','cacao','avellana','almendra','maní'],
  'Especias':['canela','clavo','pimienta','anís'],
  'Tostado / cereal':['tostada','cereal','malta','quemado','ahumado','tabaco'],
  'Ácido / fermentado':['vinoso','whisky','fermentado','sobremaduro','vinagre'],
  'Verde / otros':['herbal','hierba','madera','palito de helado','papel','terroso','mohoso','goma','medicinal','salado']
};
const EQUIP_TYPES=['Molinillo','Dripper / V60','Filtros','Prensa francesa','AeroPress','Hervidor','Báscula','Otro'];
const RECIPES=[
 {id:'hoffmann', name:'Hoffmann V60 (definitiva)',
  tip:'Molienda media-fina · 92–96 °C · tras el bloom es UN solo vertido continuo en 2 fases (rápido a 60 %, luego lento sin parar) · cucharada + remolino · drawdown objetivo ~3:00–3:30.',
  make:(d,w)=>[
    {label:'Bloom + remolino', targetW:Math.round(d*2), startT:0, endT:15},
    {label:'Vierte continuo a 60 %', targetW:Math.round(w*0.6), startT:45, endT:75},
    {label:'Sin parar, más lento, a 100 %', targetW:Math.round(w), startT:75, endT:105},
    {label:'Cucharada + remolino', targetW:null, startT:110, endT:null}]},
 {id:'hoffmann1', name:'Hoffmann V60 — 1 taza (pulsos)',
  tip:'Pensada para ~250 g · molienda media-fina · bloom 20 % del agua · 4 pulsos CON pausas (deja drenar) · remolino tras el bloom y al final · sin cuchara · fin ~3:00.',
  make:(d,w)=>[
    {label:'Bloom + remolino', targetW:Math.round(w*0.2), startT:0, endT:10},
    {label:'Pulso a 40 %', targetW:Math.round(w*0.4), startT:45, endT:55},
    {label:'Pulso a 60 %', targetW:Math.round(w*0.6), startT:70, endT:80},
    {label:'Pulso a 80 %', targetW:Math.round(w*0.8), startT:90, endT:100},
    {label:'Pulso a 100 % + remolino', targetW:Math.round(w), startT:110, endT:120}]},
 {id:'tetsu', name:'Tetsu Kasuya 4:6 (estándar)',
  tip:'Molienda GRUESA · 5 vertidas iguales (20 %) · vierte ~6 g/s · deja drenar entre vertidas · fin ~3:30.',
  make:(d,w)=>[0,40,80,120,150].map((t,i)=>({label:'Vertida '+(i+1)+' de 5', targetW:Math.round(w*0.2*(i+1)), startT:t, endT:t+10}))},
 {id:'tetsuD', name:'Tetsu 4:6 (más dulzor)',
  tip:'Igual que el estándar pero 1.ª vertida menor y 2.ª mayor (⅙ y luego hasta 40 %) → más dulzor, menos acidez.',
  make:(d,w)=>{ const c=[Math.round(w/6), Math.round(w*0.4), Math.round(w*0.6), Math.round(w*0.8), Math.round(w)];
    return [0,40,80,120,150].map((t,i)=>({label:'Vertida '+(i+1)+' de 5', targetW:c[i], startT:t, endT:t+10})); }},
 {id:'winton', name:'Matt Winton — 5 vertidas iguales',
  tip:'Molienda MEDIA (más gruesa que Hoffmann) · 93 °C, más fría (~88 °C) en las últimas · 5 vertidas iguales (20 %) agresivas y desde altura, del centro afuera y de vuelta · la señal es el lecho: vierte cuando casi deje de gotear, el reloj es orientativo.',
  make:(d,w)=>[0,40,80,120,160].map((t,i)=>({label:'Vertida '+(i+1)+' de 5'+(i===0?' (bloom)':''), targetW:Math.round(w*0.2*(i+1)), startT:t, endT:t+10}))},
 {id:'rao', name:'Scott Rao V60',
  tip:'Molienda media-fina · ~96 °C · bloom 3× la dosis removiendo con cuchara para saturar TODO · un solo vertido continuo en círculos · «Rao spin» suave al final para nivelar el lecho · fin ~3:00.',
  make:(d,w)=>[
    {label:'Bloom + remueve con cuchara', targetW:Math.round(d*3), startT:0, endT:15},
    {label:'Vierte continuo a 100 %', targetW:Math.round(w), startT:45, endT:90},
    {label:'Remolino suave (Rao spin)', targetW:null, startT:95, endT:null}]},
 {id:'continua', name:'Una sola vertida (continua)',
  tip:'Bloom 3× dosis y una vertida lenta continua. Simple y repetible; menos palancas.',
  make:(d,w)=>[
    {label:'Bloom + remolino', targetW:Math.round(d*3), startT:0, endT:15},
    {label:'Vertida continua a 100 %', targetW:Math.round(w), startT:45, endT:105}]},
 {id:'helado', name:'V60 helado (Hoffmann)',
  tip:'Pon ~40 % del agua total como HIELO en el servidor y tara con él · molienda más fina · agua bien caliente · solo viertes el 60 % líquido · al final cucharada y remueve el servidor para fundir el hielo.',
  make:(d,w)=>[
    {label:'Bloom + agita con cuchara', targetW:Math.round(d*3), startT:0, endT:15},
    {label:'Vierte lento y continuo (todo el agua caliente)', targetW:Math.round(w*0.6), startT:45, endT:105},
    {label:'Cucharada + remueve el servidor', targetW:null, startT:150, endT:null}]},
 {id:'aeropress', name:'AeroPress (Hoffmann)',
  tip:'Molienda fina · sin bloom · sin invertir · no hundas el émbolo hasta 2:30.',
  make:(d,w)=>[
    {label:'Vierte TODA el agua + tapa', targetW:Math.round(w), startT:0, endT:15},
    {label:'Gira suave la AeroPress', targetW:null, startT:120, endT:null},
    {label:'Presiona (hasta ~3:00)', targetW:null, startT:150, endT:180}]},
 {id:'prensa', name:'Prensa francesa (Hoffmann)',
  tip:'Molienda media · vierte todo · a los 4:00 rompe la costra y retira la espuma · sirve ~8:00 sin hundir el émbolo.',
  make:(d,w)=>[
    {label:'Vierte TODA el agua', targetW:Math.round(w), startT:0, endT:30},
    {label:'Rompe costra + retira espuma', targetW:null, startT:240, endT:null},
    {label:'Sirve (émbolo solo en superficie)', targetW:null, startT:480, endT:null}]}
];

/* ---------- estado ---------- */
let S=loadS();
let ui={tab:'brew', view:null, brewId:null, histId:null, beanEdit:null, equipEdit:null, editDetail:false};
let RT={int:null, curIdx:-1, c5:false, c0:false, ac:null, wl:null};

function migrate(s){
  s.equip=s.equip||[];
  (s.beans||[]).forEach(b=>{ if(b.notes==null) b.notes=''; });
  (s.brews||[]).forEach(b=>{
    if(!b.kind) b.kind='propia';
    if(b.ratio==null) b.ratio=(b.dose>0&&b.water>0)? Math.round(b.water/b.dose*100)/100 : 17;
    if(!b.gearIds) b.gearIds=[];
    (b.plan||[]).forEach(p=>{ if(p.startT==null && p.targetT!=null){ p.startT=p.targetT; p.endT=null; } });
    (b.events||[]).forEach(p=>{ if(p.startT==null && p.targetT!=null){ p.startT=p.targetT; p.endT=null; } });
    if(b.predictionReview==null) b.predictionReview='';
  });
  if(!s.updatedAt) s.updatedAt=new Date().toISOString();
  return s;
}
function loadS(){
  try{ const r=localStorage.getItem(KEY); if(r) return migrate(JSON.parse(r)); }catch(e){}
  return {beans:[], equip:[], brews:[], nextNum:1, updatedAt:new Date().toISOString()};
}
function save(){ S.updatedAt=new Date().toISOString(); try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }
const uid=()=>Math.random().toString(36).slice(2,10);
const bean=id=>S.beans.find(b=>b.id===id);
const brew=id=>S.brews.find(b=>b.id===id);
const gear=id=>S.equip.find(g=>g.id===id);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=t=>{ if(t==null||isNaN(t)) return '–'; t=Math.round(t); return Math.floor(t/60)+':'+String(t%60).padStart(2,'0'); };
const fmtd=t=>{ const m=Math.floor(t/60), s=t-m*60; return m+':'+ (s<10?'0':'') + s.toFixed(1); };
const parseT=str=>{ const m=/^(\d+):([0-5]?\d)$/.exec((str||'').trim()); return m? (+m[1])*60+(+m[2]) : null; };
const today=()=>new Date().toISOString().slice(0,10);
const dpr=(roast,d)=>{ if(!roast) return null; return Math.round((new Date(d||today())-new Date(roast))/86400000); };
const scoredOf=bid=>S.brews.filter(b=>b.beanId===bid && bid && b.status==='scored');
const winTxt=p=>(p.targetW!=null? p.targetW+' g ' : '')+'@ '+fmt(p.startT)+(p.endT!=null?'–'+fmt(p.endT):'');
const fmtDate=iso=>{ if(!iso) return '–'; try{ const d=new Date(iso); return d.toLocaleDateString('es',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso.slice(0,16); } };

/* ---------- sync (GitHub Gist) ---------- */
function loadSync(){ try{ return JSON.parse(localStorage.getItem(SYNC_KEY))||{}; }catch(e){ return {}; } }
function saveSync(s){ localStorage.setItem(SYNC_KEY, JSON.stringify(s)); }

async function ghApi(method, path, token, body){
  const opts={method, headers:{'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28'}};
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch('https://api.github.com'+path, opts);
  if(!res.ok){
    const msg=res.status===401?'Token inválido o expirado':('Error '+res.status);
    throw new Error(msg);
  }
  return res.json();
}

async function syncPush(){
  const sc=loadSync();
  if(!sc.token){ toast('Configura el token primero.'); return; }
  try{
    const payload={files:{}};
    payload.files[GIST_FILE]={content:JSON.stringify(S, null, 2)};
    if(sc.gistId){
      await ghApi('PATCH','/gists/'+sc.gistId, sc.token, payload);
    } else {
      const gist=await ghApi('POST','/gists', sc.token,
        {description:'Cuaderno — coffee brew log backup', public:false, files:payload.files});
      sc.gistId=gist.id;
    }
    sc.lastPush=new Date().toISOString();
    saveSync(sc);
    toast('Datos sincronizados con la nube.');
    render();
  } catch(e){
    toast('Error: '+e.message);
    if(e.message.includes('inválido')){ sc.token=''; saveSync(sc); render(); }
  }
}

async function syncPull(){
  const sc=loadSync();
  if(!sc.token||!sc.gistId){ toast('No hay nube configurada.'); return; }
  try{
    const gist=await ghApi('GET','/gists/'+sc.gistId, sc.token);
    const file=gist.files[GIST_FILE];
    if(!file){ toast('No se encontró el archivo en el Gist.'); return; }
    const data=JSON.parse(file.content);
    if(!data.brews||!data.beans){ toast('Datos inválidos en la nube.'); return; }
    S=migrate(data); save();
    sc.lastPull=new Date().toISOString();
    saveSync(sc);
    toast('Datos restaurados desde la nube.');
    render();
  } catch(e){
    toast('Error: '+e.message);
  }
}

async function syncValidateToken(token){
  try{
    await ghApi('GET','/gists?per_page=1', token);
    return true;
  } catch(e){ return false; }
}

/* ---------- audio + señales ---------- */
function beep(freq,dur,when){ try{
  RT.ac=RT.ac||new (window.AudioContext||window.webkitAudioContext)();
  const t=RT.ac.currentTime+(when||0), o=RT.ac.createOscillator(), g=RT.ac.createGain();
  o.type='sine'; o.frequency.value=freq; g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(RT.ac.destination); o.start(t); o.stop(t+dur+0.05);
}catch(e){} }
function cueSoft(){ beep(660,.12); }
function cueNow(){ beep(880,.14); beep(1100,.16,.18);
  const f=document.getElementById('flash'); f.classList.remove('go'); void f.offsetWidth; f.classList.add('go'); }
let toastTO=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTO); toastTO=setTimeout(()=>t.classList.remove('show'), 2400); }
function armed(elm){
  if(elm.dataset.armed==='1'){ elm.dataset.armed=''; return true; }
  elm.dataset.armed='1'; const old=elm.textContent; elm.textContent='¿Seguro? toca otra vez';
  setTimeout(()=>{ if(elm.isConnected && elm.dataset.armed==='1'){ elm.dataset.armed=''; elm.textContent=old; } }, 2600);
  return false;
}
async function wakeOn(){
  try{ if('wakeLock' in navigator){ RT.wl=await navigator.wakeLock.request('screen'); return; } }catch(e){}
  if(!RT.noSleepV){
    try{
      const c=document.createElement('canvas'); c.width=c.height=1;
      c.getContext('2d').fillRect(0,0,1,1);
      RT.noSleepV=document.createElement('video');
      RT.noSleepV.setAttribute('playsinline','');
      RT.noSleepV.muted=true;
      RT.noSleepV.style.cssText='position:fixed;width:1px;height:1px;opacity:0;pointer-events:none';
      RT.noSleepV.srcObject=c.captureStream(0);
      document.body.appendChild(RT.noSleepV);
    }catch(e){ return; }
  }
  try{ await RT.noSleepV.play(); }catch(e){}
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') wakeOn(); });
document.addEventListener('click',function firstWake(){ wakeOn(); document.removeEventListener('click',firstWake); },{once:true});
wakeOn();

/* ---------- radar ---------- */
function radarSvg(series, opts){
  opts=opts||{}; const size=opts.size||320, cx=size/2, cy=size/2, R=size/2-42;
  const pt=(i,v)=>{ const a=-Math.PI/2 + i*Math.PI/4; const r=R*v;
    return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
  let s='<svg id="'+(opts.id||'')+'" viewBox="0 0 '+size+' '+size+'" width="100%" style="max-width:'+size+'px;display:block;margin:0 auto;touch-action:manipulation">';
  for(let ring=1; ring<=5; ring++){
    const pts=AXES.map((_,i)=>pt(i,ring/5).join(',')).join(' ');
    s+='<polygon points="'+pts+'" fill="none" stroke="var(--line)" stroke-width="1"/>';
  }
  AXES.forEach((ax,i)=>{ const [x,y]=pt(i,1);
    s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x+'" y2="'+y+'" stroke="var(--line)" stroke-width="1"/>';
    const [lx,ly]=pt(i,1.17);
    let anch='middle'; if(lx<cx-10)anch='end'; if(lx>cx+10)anch='start';
    s+='<text x="'+lx+'" y="'+(ly+4)+'" text-anchor="'+anch+'" font-size="12" fill="var(--ink2)">'+ax[1]+'</text>';
  });
  series.forEach(se=>{
    const vals=AXES.map((ax,i)=>({i, v: se.values[ax[0]]==null?0:se.values[ax[0]]}));
    const pts=vals.map(o=>pt(o.i,o.v).join(',')).join(' ');
    s+='<polygon points="'+pts+'" fill="'+se.color+'" fill-opacity="0.14" stroke="'+se.color+'" stroke-width="2" stroke-linejoin="round"/>';
    vals.forEach(o=>{ const [x,y]=pt(o.i,o.v);
      s+='<circle cx="'+x+'" cy="'+y+'" r="4.5" fill="'+se.color+'" stroke="var(--surface)" stroke-width="2"/>'; });
  });
  return s+'</svg>';
}
function bindRadarInput(svgId, values, onSet){
  const svg=document.getElementById(svgId); if(!svg) return;
  svg.addEventListener('pointerdown',ev=>{
    const r=svg.getBoundingClientRect(), size=320;
    const x=(ev.clientX-r.left)/r.width*size - size/2, y=(ev.clientY-r.top)/r.height*size - size/2;
    const R=size/2-42;
    let ang=Math.atan2(y,x)+Math.PI/2; if(ang<0) ang+=2*Math.PI;
    const i=Math.round(ang/(Math.PI/4))%8;
    const rad=Math.sqrt(x*x+y*y);
    let v=Math.round(rad/R*10)/10; if(rad < R*0.06) v=0; v=Math.max(0,Math.min(1,v));
    values[AXES[i][0]]=v; onSet();
  });
}

  document.getElementById('tabs').innerHTML=TABS.map(t=>

    '<span class="ic">'+t[1]+'</span>'+t[2]+'</button>').join('');
}
function render(){
  renderTabs();
  const m=document.getElementById('main');
  if(ui.tab==='beans'){ m.innerHTML=vBeans(); return; }
  if(ui.tab==='equip'){ m.innerHTML=vEquip(); return; }
  if(ui.tab==='history'){ m.innerHTML = ui.histId? vDetail(brew(ui.histId)) : vHistory(); return; }
  const b=brew(ui.brewId);
  if(!ui.view || !b){ m.innerHTML=vStart(); return; }
  if(ui.view==='setup')   { m.innerHTML=vSetup(b); return; }
  if(ui.view==='setupExt'){ m.innerHTML=vSetupExt(b); return; }
  if(ui.view==='live')    { m.innerHTML=vLive(b); tickDom(); return; }
  if(ui.view==='weights') { m.innerHTML=vWeights(b); return; }
  if(ui.view==='taste')   { m.innerHTML=vTaste(b); afterTaste(b); return; }
  if(ui.view==='done')    { m.innerHTML=vDetail(b,true); return; }
  m.innerHTML=vStart();
}

function doneIdx(b){ return b.events.filter(e=>e.actualT!=null).length; }
function planOverview(b){
  let rows='';
  b.events.forEach((e,i)=>{
    rows+='<li><span class="t">'+fmt(e.startT)+(e.endT!=null?'–'+fmt(e.endT):'')+'</span>'+
      '<span class="grow">'+esc(e.label)+'</span>'+
      (e.targetW!=null?'<span class="muted" style="white-space:nowrap">hasta '+e.targetW+' g</span>':'')+'</li>';
    const nx=b.events[i+1];
    if(nx&&nx.startT!=null&&e.endT!=null){
      const gap=nx.startT-e.endT;
      if(gap>=5) rows+='<li><span class="t"></span><span class="grow muted">⏸ espera '+gap+' s — deja drenar</span></li>';
      else if(e.targetW!=null&&nx.targetW!=null) rows+='<li><span class="t"></span><span class="grow muted">▾ sin pausa — sigue vertiendo, solo cambia el ritmo</span></li>';
    }
  });
  return '<div class="nextcard" style="margin-top:14px"><span class="lbl">Receta completa — repásala antes de arrancar</span>'+
    '<ul class="steps" style="margin-top:4px">'+rows+'</ul></div>';
}
function vLive(b){
  const i=doneIdx(b), cur=b.events[i], started=!!b.startedAt;
  let h='<div id="clock">0:00.0</div>';
  h+='<div class="nextcard" id="nextcard">'+(cur?
      '<span class="lbl" id="phlbl">'+(started?'':'Primer paso')+'</span><div class="what">'+esc(cur.label)+
      (cur.targetW!=null?' → '+cur.targetW+' g':'')+'</div><div class="row"><span class="small">'+winTxt(cur)+'</span>'+
      '<span class="grow"></span><span class="cd" id="cd"></span></div>'
      :'<span class="lbl">Pasos completados</span><div class="what">Esperando drawdown…</div>')+'</div>';
  if(!started){
    h+='<button class="tapbtn" data-act="startT" style="margin-top:14px">ARRANCAR TEMPORIZADOR</button>'+
       planOverview(b);
  } else if(cur){
    h+='<button class="tapbtn" data-act="tap" style="margin-top:14px">'+(cur.targetW!=null?'YA VERTÍ':'HECHO')+' — '+esc(cur.label).toUpperCase()+' ✓</button>'+
       '<div class="muted" style="text-align:center;margin-top:6px">Toca al <b>terminar</b> '+(cur.targetW!=null?'la vertida':'el paso')+', no al empezar. Si el lecho drena antes, vierte antes — el toque marca el final real.</div>';
  } else {
    h+='<button class="tapbtn" data-act="dd" style="margin-top:14px">DRAWDOWN TERMINADO</button>';
  }
  if(started) h+='<div class="row" style="justify-content:center;margin-top:8px">'+
    '<button class="btn ghost" data-act="mark">＋ marcar evento no planeado</button></div>';
  const done=b.events.filter(e=>e.actualT!=null);
  if(done.length){
    h+='<ul class="steps">'+done.map((e,j)=>{
      const ref=(e.endT!=null?e.endT:e.startT);
      const dev=(ref!=null)?(' <span class="dev">('+(e.actualT-ref>=0?'+':'')+Math.round(e.actualT-ref)+'s)</span>'):'';
      return '<li><span class="tick">✓</span><span class="t">'+fmt(e.actualT)+'</span>'+
        '<span class="grow">'+esc(e.label)+dev+'</span>'+
        (e.targetW!=null?'<span class="stepper"><button data-act="wd" data-j="'+j+'" data-d="-1">−1</button>'+
        '<button data-act="wd" data-j="'+j+'" data-d="-0.1">−.1</button>'+
        '<span class="val">'+(e.actualW!=null?e.actualW.toFixed(1):'–')+'g</span>'+
        '<button data-act="wd" data-j="'+j+'" data-d="0.1">+.1</button>'+
        '<button data-act="wd" data-j="'+j+'" data-d="1">+1</button></span>':'')+'</li>';
    }).join('')+'</ul>';
    h+='<div class="muted" style="text-align:center;margin-top:4px">Ajusta los pesos a la lectura real de la báscula mientras esperas.</div>';
  }
  h+='<div class="row" style="margin-top:18px;justify-content:center"><button class="btn ghost danger" data-act="endEarly">terminar antes</button></div>';
  return h;

function vTaste(b){
  const prev=scoredOf(b.beanId).filter(x=>x.id!==b.id);
  const be=bean(b.beanId);
  b.scores=b.scores||{}; b.desc=b.desc||{aroma:'',body:'',taste:'',colour:''}; b.wheel=b.wheel||[];
  let h='<h2>'+brewTitle(b)+' — cátalo</h2>';
  const hiders=[];
  if(prev.length) hiders.push(prev.length+' radar'+(prev.length>1?'es':'')+' previo'+(prev.length>1?'s':'')+' de este grano');
  if(be && be.bagNotes) hiders.push('las notas de la bolsa');
  if(hiders.length) h+='<div class="blind">🙈 Cata a ciegas — '+hiders.join(' y ')+' quedan ocultos hasta guardar. Primero tu lectura.</div>';
  h+='<div class="card"><div id="radarwrap">'+radarSvg([{values:b.scores, color:'var(--cur)'}],{id:'radarIn'})+'</div>'+
     '<div class="muted" style="text-align:center">Toca un eje a la altura del anillo · pasos de 0,1 · centro = 0</div>'+
     '<div class="vals" id="valchips">'+valChips(b.scores)+'</div></div>';
  h+='<h3>Tus palabras primero — descriptores</h3><div class="card">';
  [['aroma','Aroma (seco + húmedo)'],['body','Cuerpo / textura'],['taste','Sabor'],['colour','Color']].forEach(d=>{
    h+='<label class="f">'+d[1]+'</label><textarea data-bind="desc.'+d[0]+'" rows="2">'+esc(b.desc[d[0]])+'</textarea>';
  });
  h+='</div>';
  h+='<h3>Vocabulario estándar (opcional, después de tus palabras)</h3>'+
     '<div class="card" id="wheelcard">'+wheelChips(b)+'</div>';
  h+='<h3>Notas</h3><div class="card"><textarea data-bind="notes" rows="3" placeholder="Lo demás — fallos de proceso, estado del paladar, hipótesis…">'+esc(b.notes)+'</textarea></div>';
  h+='<button class="btn primary block" data-act="saveScores" style="min-height:56px">Guardar cata'+(hiders.length?' y revelar':'')+' →</button>';

}
function valChips(sc){
  return AXES.map(ax=>{ const v=sc[ax[0]];
    return '<div class="v'+(v==null?' unset':'')+'">'+ax[1]+'<b>'+(v==null?'·':v.toFixed(1).replace('.',','))+'</b></div>'; }).join('');
}
function wheelChips(b){
  const anyWords=Object.values(b.desc||{}).some(t=>(t||'').trim().length>=3);
  if(!anyWords) return '<div class="muted">Escribe al menos un descriptor propio arriba — mirar la rueda antes te ancla.</div>';
  let h='';
  for(const g in WHEEL){ h+='<div class="small" style="margin:8px 0 2px;font-weight:600">'+g+'</div><div class="chips">'+
    WHEEL[g].map(t=>'<button class="chip'+(b.wheel.includes(t)?' on':'')+'" data-act="wheel" data-t="'+esc(t)+'">'+t+'</button>').join('')+'</div>'; }
  return h;
}
function afterTaste(b){

}

function mdFor(b){
  const be=bean(b.beanId)||{};
  const L=[];
  if(b.kind==='externa'){
    L.push('## Cata externa — '+(b.lugar||'¿?')+' ('+b.date+') — app Cuaderno');
    L.push('');
    L.push('**Café**: '+(be.name? be.name+(be.roaster?' — '+be.roaster:'') : (b.cafeTexto||'desconocido')));
    if(b.method) L.push('**Método**: '+b.method);
  } else {
    const gearNames=(b.gearIds||[]).map(id=>{const g=gear(id); return g?(g.type?g.type+': ':'')+g.name:null;}).filter(Boolean);
    L.push('## Registro — Café '+b.coffeeNum+' ('+b.date+') — app Cuaderno');
    L.push('');
    L.push('**Grano**: '+(be.name||'¿?')+(be.roaster?' — '+be.roaster:'')+(be.variety?' · '+be.variety:'')+(be.process?' · '+be.process:''));
    if(be.roastDate) L.push('**Tueste**: '+be.roastDate+' (~'+dpr(be.roastDate,b.date)+' días post-tueste)');
    L.push('**Método**: '+b.method+' · **Molienda**: '+b.grindSetting+(b.temp?' · **Temp**: '+b.temp+' °C':''));
    if(gearNames.length) L.push('**Equipo**: '+gearNames.join(' · '));
    L.push('**Agua**: '+b.waterProfile);
    L.push('**Dosis**: '+b.dose+' g · **Agua**: '+b.water+' g · **Ratio**: 1:'+(b.dose>0?(b.water/b.dose).toFixed(2):'?'));
    L.push('');
    if(b.prediction){ L.push('**Predicción (escrita antes de preparar, bloqueada)**: '+b.prediction);
      if(b.predictionReview) L.push('**Resultado de la predicción**: '+b.predictionReview);
      L.push(''); }
    L.push('**Registro de vertidas (plan vs real)**:');
    L.push('| Paso | Plan | t real | g real |');
    L.push('|---|---|---|---|');
    (b.events||[]).forEach(e=>{
      L.push('| '+e.label+' | '+winTxt(e)+' | '+fmt(e.actualT)+' | '+(e.actualW!=null?e.actualW.toFixed(1)+' g':'—')+' |');
    });
    L.push('');
    L.push('**Fin de drawdown**: '+fmt(b.drawdownT));
  }
  L.push('');
  L.push('**Radar (0–1, pasos de 0,1'+(b.blind?', catado a ciegas — radares previos y notas de la bolsa ocultos hasta guardar':'')+')**: '+
    AXES.map(ax=>ax[1].toLowerCase()+' '+((b.scores||{})[ax[0]]!=null?b.scores[ax[0]].toFixed(1):'–')).join(', '));
  const d=b.desc||{};
  L.push('**Descriptores (palabras propias primero)** — aroma: '+(d.aroma||'—')+' · cuerpo: '+(d.body||'—')+' · sabor: '+(d.taste||'—')+' · color: '+(d.colour||'—'));
  if((b.wheel||[]).length) L.push('**Rueda de sabores (elegidos después)**: '+b.wheel.join(', '));
  if(b.notes) L.push('**Notas**: '+b.notes);
  if(be.notes) L.push('**Notas del grano**: '+be.notes);
  L.push('');
  L.push(b.kind==='externa'
    ? '_Por favor /ingest como cata externa en el tasting log._'
    : '_Por favor /ingest como la siguiente entrada del tasting log (coffee-'+b.coffeeNum+')._');
  return L.join('\n');
}
async function copyText(t, msgEl){
  let ok=false;
  try{ await navigator.clipboard.writeText(t); ok=true; }catch(e){
    try{ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta);
      ta.select(); ok=document.execCommand('copy'); ta.remove(); }catch(e2){}
  }
  if(msgEl) msgEl.textContent= ok? 'Copiado — pégalo a Claude y di /ingest.' : 'No se pudo copiar — usa Compartir.';
}

/* ---------- temporizador ---------- */
function elapsed(b){ return b.startedAt? (Date.now()-b.startedAt)/1000 : 0; }
function phaseInfo(b, el){
  const i=doneIdx(b), cur=b.events[i];
  if(!cur) return {i, mode:'dd'};
  const st=cur.startT, en=cur.endT;
  if(st!=null && el<st) return {i, mode:'wait', rem:st-el, cur};
  if(en!=null && el<=en) return {i, mode:'pour', rem:en-el, cur};
  const ref=(en!=null?en:st);
  return {i, mode:'over', late:(ref!=null? el-ref : 0), cur};
}
function tickDom(){
  const b=brew(ui.brewId); if(!b||ui.view!=='live') return;
  const el=elapsed(b), c=document.getElementById('clock');
  if(c) c.textContent=fmtd(b.startedAt?el:0);
  if(!b.startedAt) return;
  const ph=phaseInfo(b, el), nc=document.getElementById('nextcard'), cd=document.getElementById('cd');
  if(ph.i!==RT.curIdx){ RT.curIdx=ph.i; RT.c5=false;
    RT.c0 = ph.cur? (ph.cur.startT===0 || ph.cur.startT==null) : true; }
  const pl=document.getElementById('phlbl');
  if(ph.mode==='wait'){
    if(pl) pl.textContent='Espera — no viertas todavía';
    if(cd) cd.textContent='vierte en '+fmt(Math.ceil(ph.rem));
    if(nc) nc.classList.remove('cue');
    if(ph.rem<=5 && !RT.c5){ RT.c5=true; cueSoft(); }
  } else if(ph.mode==='pour'){
    if(!RT.c0){ RT.c0=true; cueNow(); }
    if(pl) pl.textContent='¡Vierte ahora!';
    if(cd) cd.textContent='termina en '+fmt(Math.ceil(ph.rem));
    if(nc) nc.classList.add('cue');
  } else if(ph.mode==='over'){
    if(!RT.c0){ RT.c0=true; cueNow(); }
    if(pl) pl.textContent='Termina y toca';
    if(cd) cd.textContent= ph.late>2? '+'+fmt(ph.late)+' pasado' : '';
    if(nc) nc.classList.add('cue');
  } else if(cd){ cd.textContent=''; if(nc) nc.classList.remove('cue'); }
}
function startInt(){ stopInt(); RT.curIdx=-1; RT.int=setInterval(tickDom,100); }
function stopInt(){ if(RT.int){ clearInterval(RT.int); RT.int=null; } }

/* ---------- acciones ---------- */
const acts={
  tab(d){ ui.tab=d.tab; ui.histId=null; ui.beanEdit=null; ui.equipEdit=null; render(); },
  home(){ ui.tab='brew'; ui.view=null; ui.brewId=null; ui.editDetail=false; render(); },

    const last=S.brews.filter(x=>x.kind!=='externa').slice(-1)[0];
    const b={ id:uid(), kind:'propia', coffeeNum:S.nextNum, date:today(), status:'setup',
      beanId:(last?last.beanId:(S.beans[0]&&S.beans[0].id))||'',
      gearIds:last?last.gearIds.slice():[],
      method:last?last.method:'V60 (Hoffmann)', grindSetting:last?last.grindSetting:'15',
      waterProfile:last?last.waterProfile:'DIY Melbourne (~102 ppm TDS)',
      temp:last?last.temp:'', dose:last?last.dose:15, ratio:last?last.ratio:17,
      water:0, plan:[], prediction:'', predictionReview:'', events:[], drawdownT:null, startedAt:null, endedAt:null,
      scores:null, desc:null, wheel:[], notes:'', blind:false, lugar:'', cafeTexto:'' };
    b.water=Math.round(b.dose*b.ratio);
    if(last&&last.plan&&last.plan.length) b.plan=last.plan.map(p=>({label:p.label,targetW:p.targetW,startT:p.startT,endT:p.endT}));
    else b.plan=RECIPES[0].make(b.dose,b.water);
    S.brews.push(b); save(); ui.tab='brew'; ui.brewId=b.id; ui.view='setup'; render();
  },
  newExt(){
    const b={ id:uid(), kind:'externa', coffeeNum:null, date:today(), status:'setup',
      beanId:'', gearIds:[], method:'', grindSetting:'', waterProfile:'', temp:'',
      dose:0, ratio:0, water:0, plan:[], prediction:'', predictionReview:'', events:[], drawdownT:null,
      startedAt:null, endedAt:null, scores:null, desc:null, wheel:[], notes:'', blind:false,
      lugar:'', cafeTexto:'' };
    S.brews.push(b); save(); ui.tab='brew'; ui.brewId=b.id; ui.view='setupExt'; render();
  },
  applyRecipe(){ const b=brew(ui.brewId); const sel=document.getElementById('recipeSel');
    const r=RECIPES[+sel.value]; b.plan=r.make(b.dose,b.water); save(); render();
    const s2=document.getElementById('recipeSel'); if(s2) s2.value=sel.value;
    const dsc=document.getElementById('recipeDesc'); if(dsc) dsc.textContent=r.tip; },
  addStep(){ const b=brew(ui.brewId); b.plan.push({label:'Vertida', targetW:null, startT:null, endT:null}); save(); render(); },
  delStep(d){ const b=brew(ui.brewId); b.plan.splice(+d.i,1); save(); render(); },
  gearTog(d){ const b=brew(ui.brewId); const k=b.gearIds.indexOf(d.id);
    if(k>=0) b.gearIds.splice(k,1); else b.gearIds.push(d.id); save(); render(); },
  resume(d){ const b=brew(d.id); ui.tab='brew'; ui.brewId=b.id;
    ui.view= b.status==='setup'?(b.kind==='externa'?'setupExt':'setup')
           : b.status==='live'?(b.endedAt?'weights':'live')
           : b.status==='brewed'?'taste':'done';
    if(ui.view==='live'&&b.startedAt){ startInt(); wakeOn(); }
    render(); },
  abort(d,elm){ if(!armed(elm)) return;
    const b=brew(ui.brewId); S.brews=S.brews.filter(x=>x.id!==b.id); save(); acts.home(); toast('Descartado'); },
  toLive(){ const b=brew(ui.brewId);
    b.plan=b.plan.filter(p=>p.label && p.label.trim());
    b.events=b.plan.map(p=>({label:p.label, targetW:p.targetW, startT:p.startT, endT:p.endT, actualT:null, actualW:null}));
    b.status='live'; save(); ui.view='live'; render(); },
  extToTaste(){ const b=brew(ui.brewId); b.status='brewed';
    b.blind = scoredOf(b.beanId).filter(x=>x.id!==b.id).length>0 || !!(bean(b.beanId)||{}).bagNotes;
    save(); ui.view='taste'; render(); },
  startT(){ const b=brew(ui.brewId); b.startedAt=Date.now();
    try{ RT.ac=RT.ac||new (window.AudioContext||window.webkitAudioContext)(); RT.ac.resume&&RT.ac.resume(); }catch(e){}
    save(); startInt(); wakeOn(); render(); },
  tap(){ const b=brew(ui.brewId); const i=doneIdx(b); const e=b.events[i]; if(!e) return;
    e.actualT=elapsed(b); if(e.actualW==null && e.targetW!=null) e.actualW=e.targetW;
    save(); render(); },
  mark(){ const b=brew(ui.brewId);
    b.events.splice(doneIdx(b),0,{label:'Evento', targetW:null, startT:null, endT:null, actualT:elapsed(b), actualW:null});
    save(); render(); },
  wd(d){ const b=brew(ui.brewId); const done=b.events.filter(e=>e.actualT!=null); const e=done[+d.j]; if(!e) return;
    e.actualW=Math.max(0, Math.round(((e.actualW||0)+parseFloat(d.d))*10)/10); save(); render(); },
  dd(){ const b=brew(ui.brewId); b.drawdownT=elapsed(b); b.endedAt=Date.now();
    stopInt(); save(); ui.view='weights'; render(); },
  endEarly(){ const b=brew(ui.brewId); b.endedAt=Date.now(); if(b.startedAt&&b.drawdownT==null) b.drawdownT=elapsed(b);
    stopInt(); save(); ui.view='weights'; render(); },
  toTaste(){ const b=brew(ui.brewId); b.status='brewed';
    const lastW=b.events.filter(e=>e.actualW!=null).slice(-1)[0]; if(lastW) b.water=lastW.actualW;
    b.blind = scoredOf(b.beanId).filter(x=>x.id!==b.id).length>0 || !!(bean(b.beanId)||{}).bagNotes;
    save(); ui.view='taste'; render(); },
  wheel(d,elm){ const b=brew(ui.brewId||ui.histId); const t=d.t;
    const k=b.wheel.indexOf(t); if(k>=0) b.wheel.splice(k,1); else b.wheel.push(t);
    save(); elm.classList.toggle('on'); },
  saveScores(){ const b=brew(ui.brewId); b.status='scored';
    if(b.kind!=='externa') S.nextNum=Math.max(S.nextNum, (+b.coffeeNum||0)+1);
    save(); ui.view='done'; render(); window.scrollTo(0,0); },
  copyMd(d){ copyText(mdFor(brew(d.id)), document.getElementById('copymsg')); },
  shareMd(d){ const b=brew(d.id);
    try{ navigator.share({title:brewTitle(b), text:mdFor(b)}); }catch(e){} },
  hist(d){ ui.tab='history'; ui.histId=d.id; ui.editDetail=false; render(); window.scrollTo(0,0); },
  backHist(){ ui.histId=null; ui.editDetail=false; render(); },
  editDetail(){ ui.editDetail=true; render(); window.scrollTo(0,0); },
  saveDetail(){ ui.editDetail=false; save(); render(); window.scrollTo(0,0); },
  delBrew(d,elm){ if(!armed(elm)) return;
    S.brews=S.brews.filter(x=>x.id!==d.id); save(); ui.histId=null; render(); toast('Registro borrado'); },
  beanNew(){ ui.beanEdit={id:null,name:'',roaster:'',variety:'',process:'',roastDate:'',bagNotes:'',notes:''}; render(); },
  beanEdit(d){ ui.beanEdit=JSON.parse(JSON.stringify(bean(d.id))); render(); },
  beanCancel(){ ui.beanEdit=null; render(); },
  beanSave(){ const e=ui.beanEdit; if(!e.name||!e.name.trim()){ toast('Ponle un nombre al grano.'); return; }
    if(e.id){ const i=S.beans.findIndex(b=>b.id===e.id); S.beans[i]=e; }
    else { e.id=uid(); S.beans.push(e); }
    save(); ui.beanEdit=null; render(); },
  beanDel(d,elm){ if(!armed(elm)) return;
    S.beans=S.beans.filter(b=>b.id!==d.id); save(); ui.beanEdit=null; render(); toast('Grano borrado'); },
  equipNew(){ ui.equipEdit={id:null,type:'',name:'',notes:''}; render(); },
  equipEdit(d){ ui.equipEdit=JSON.parse(JSON.stringify(gear(d.id))); render(); },
  equipCancel(){ ui.equipEdit=null; render(); },
  equipSave(){ const e=ui.equipEdit; if(!e.name||!e.name.trim()){ toast('Ponle un nombre.'); return; }
    if(!e.type||!e.type.trim()) e.type='Otro';
    if(e.id){ const i=S.equip.findIndex(g=>g.id===e.id); S.equip[i]=e; }
    else { e.id=uid(); S.equip.push(e); }
    save(); ui.equipEdit=null; render(); },
  equipDel(d,elm){ if(!armed(elm)) return;
    S.equip=S.equip.filter(g=>g.id!==d.id); S.brews.forEach(b=>{ b.gearIds=(b.gearIds||[]).filter(x=>x!==d.id); });
    save(); ui.equipEdit=null; render(); toast('Equipo borrado'); },
  copyAll(){ copyText(JSON.stringify(S)); toast('Datos copiados como JSON — guárdalos en un lugar seguro.'); },
  restore(d,elm){ const t=document.getElementById('restorebox').value.trim(); if(!t){ toast('Pega primero el JSON.'); return; }
    if(!armed(elm)) return;
    try{ const j=JSON.parse(t); if(!j.brews||!j.beans) throw 0;
      S=migrate(j); save(); render(); toast('Datos restaurados'); }
    catch(e){ toast('Eso no parece una copia de Cuaderno.'); } },
  async syncConnect(){
    const inp=document.getElementById('syncToken'); if(!inp) return;
    const token=inp.value.trim();
    if(!token){ toast('Pega el token.'); return; }
    toast('Validando token…');
    const ok=await syncValidateToken(token);
    if(!ok){ toast('Token inválido — revisa permisos y fecha.'); return; }
    toast('Buscando datos en la nube…');
    const sc={token};
    try{
      const gists=await ghApi('GET','/gists?per_page=100', token);
      const existing=gists.find(g=>g.description==='Cuaderno — coffee brew log backup' && g.files[GIST_FILE]);
      if(existing){
        sc.gistId=existing.id;
        saveSync(sc);
        toast('Conectado a Gist existente.');
        render();
        return;
      }
    }catch(e){}
    saveSync(sc);
    await syncPush();
  },
  async syncPush(){ await syncPush(); },
  async syncPull(d,elm){ if(!armed(elm)) return; await syncPull(); },
  syncDisconnect(d,elm){ if(!armed(elm)) return;
    saveSync({}); toast('Nube desconectada.'); render(); },
  checkUpdate(){
    if('serviceWorker' in navigator) navigator.serviceWorker.getRegistration().then(r=>{ if(r) r.update(); });
    toast('Buscando…'); setTimeout(()=>{ if(!swWaiting) toast('Ya tienes la última versión.'); }, 2000);
  }
};

/* ---------- delegación ---------- */
document.addEventListener('click',ev=>{
  const a=ev.target.closest('[data-act]'); if(!a) return;
  const act=acts[a.dataset.act]; if(act) act(a.dataset, a);
});
function setPath(obj, path, val){
  const ks=path.split('.'); let o=obj;
  for(let i=0;i<ks.length-1;i++) o=o[ks[i]];
  o[ks[ks.length-1]]=val;
}
const r1=x=>Math.round(x*10)/10, r2=x=>Math.round(x*100)/100;
document.addEventListener('input',ev=>{
  const t=ev.target;
  if(t.dataset.bbind && ui.beanEdit){ ui.beanEdit[t.dataset.bbind]=t.value; return; }
  if(t.dataset.ebind && ui.equipEdit){ ui.equipEdit[t.dataset.ebind]=t.value; return; }
  if(!t.dataset.bind) return;
  const b=brew(ui.brewId||ui.histId); if(!b) return;
  let v=t.value; if('num' in t.dataset){ v=parseFloat(v); if(isNaN(v)) v=null; }
  setPath(b, t.dataset.bind, v); save();
  if(t.dataset.bind==='dose' && b.dose>0 && b.ratio>0){ b.water=r1(b.dose*b.ratio);
    const w=document.getElementById('inpWater'); if(w) w.value=b.water; save(); }
  if(t.dataset.bind==='ratio' && b.dose>0 && b.ratio>0){ b.water=r1(b.dose*b.ratio);
    const w=document.getElementById('inpWater'); if(w) w.value=b.water; save(); }
  if(t.dataset.bind==='water' && b.dose>0 && b.water>0){ b.ratio=r2(b.water/b.dose);
    const r=document.getElementById('inpRatio'); if(r) r.value=b.ratio; save(); }
  if(t.dataset.bind && t.dataset.bind.startsWith('desc.')){
    const wc=document.getElementById('wheelcard'); if(wc) wc.innerHTML=wheelChips(b);
  }
});
document.addEventListener('change',ev=>{
  const t=ev.target;
  if(t.dataset.bindtime){ const b=brew(ui.brewId||ui.histId); if(!b) return;
    setPath(b, t.dataset.bindtime, parseT(t.value)); save(); return; }
  if(t.id==='recipeSel'){ const dsc=document.getElementById('recipeDesc');
    if(dsc) dsc.textContent=RECIPES[+t.value].tip; return; }
  if(t.dataset.bind==='beanId'){ render(); }
});

/* ---------- service worker ---------- */
const APP_VERSION='v4.7';
let swWaiting=null;
function updateApp(){
  if(swWaiting){ swWaiting.postMessage({type:'SKIP_WAITING'}); }
  location.reload();
}
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js',{updateViaCache:'none'}).then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed' && navigator.serviceWorker.controller){
          swWaiting=nw;
          document.getElementById('updateBar').classList.add('show');
        }
      });
    });
  }).catch(()=>{});
  navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
}

/* ---------- arranque ---------- */
render();
